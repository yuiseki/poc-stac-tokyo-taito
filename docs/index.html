<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台東区オープンデータ STAC ジオポータル</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font: 13px/1.5 -apple-system, 'Noto Sans JP', sans-serif; background: #0d1426; color: #e2e8f0; }

    #app { display: flex; height: 100%; }

    /* Sidebar */
    #sidebar {
      width: 260px; flex-shrink: 0;
      background: rgba(13, 20, 38, 0.97);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    #sidebar-header h1 { font-size: 13px; font-weight: 600; color: #93c5fd; margin-bottom: 4px; }
    #status-line { font-size: 11px; color: #64748b; display: flex; align-items: center; gap: 5px; }
    #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #64748b; flex-shrink: 0; }
    #status-dot.online { background: #4ade80; }
    #status-dot.error  { background: #f87171; }

    /* Megurin section */
    #megurin-section {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    #megurin-section h2 { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .megurin-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: #334155; border-radius: 20px; cursor: pointer; transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s;
    }
    input:checked + .toggle-track { background: #4f46e5; }
    input:checked + .toggle-track::after { transform: translateX(16px); }
    .megurin-label { font-size: 12px; flex: 1; }
    #bus-count { font-size: 11px; color: #94a3b8; }

    /* Time slider */
    #sim-controls { margin-top: 8px; display: none; }
    #sim-controls.visible { display: block; }
    .sim-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    #sim-time-slider { flex: 1; accent-color: #4f46e5; }
    #sim-time-display { font-size: 11px; color: #93c5fd; white-space: nowrap; min-width: 56px; text-align: right; }
    .speed-btn {
      font-size: 11px; padding: 2px 8px; border-radius: 3px; cursor: pointer;
      background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    }
    .speed-btn.active { background: #312e81; border-color: #4f46e5; color: #93c5fd; }

    /* Collections */
    #collections-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
    #collections-scroll::-webkit-scrollbar { width: 4px; }
    #collections-scroll::-webkit-scrollbar-track { background: transparent; }
    #collections-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    .col-group { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; cursor: pointer; user-select: none;
      font-size: 12px; font-weight: 600; color: #cbd5e1;
    }
    .col-header:hover { background: rgba(255,255,255,0.04); }
    .col-caret { font-size: 10px; color: #64748b; margin-left: auto; transition: transform .15s; }
    .col-caret.open { transform: rotate(90deg); }
    .col-items { display: none; }
    .col-items.open { display: block; }
    .dataset-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px 6px 28px; cursor: pointer;
      font-size: 12px; color: #94a3b8;
    }
    .dataset-item:hover { background: rgba(255,255,255,0.04); color: #e2e8f0; }
    .dataset-item.active { color: #93c5fd; }
    .dataset-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Map */
    #map { flex: 1; }

    /* Map overlay */
    #map-overlay {
      position: absolute; top: 10px; right: 50px; z-index: 1;
      display: flex; flex-direction: column; gap: 4px;
    }
    .overlay-btn {
      background: rgba(13,20,38,0.85); border: 1px solid rgba(255,255,255,0.12);
      color: #cbd5e1; font-size: 11px; padding: 5px 10px; border-radius: 4px;
      cursor: pointer; white-space: nowrap;
    }
    .overlay-btn:hover { background: rgba(31,46,74,0.9); color: #e2e8f0; }
    .overlay-btn.active { border-color: #4f46e5; color: #93c5fd; }

    /* Popup */
    .maplibregl-popup-content {
      background: rgba(13,20,38,0.97) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: #e2e8f0 !important;
      border-radius: 6px !important;
      padding: 10px 12px !important;
      font-size: 12px !important;
      max-width: 280px !important;
      max-height: 240px !important;
      overflow-y: auto !important;
    }
    .maplibregl-popup-tip { border-top-color: rgba(13,20,38,0.97) !important; }
    .popup-title { font-weight: 600; font-size: 13px; color: #93c5fd; margin-bottom: 6px; }
    .popup-row { display: flex; gap: 6px; margin-top: 3px; }
    .popup-key { color: #64748b; flex-shrink: 0; min-width: 60px; }
    .popup-val { color: #cbd5e1; word-break: break-all; }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>台東区 STAC ジオポータル</h1>
      <div id="status-line">
        <span id="status-dot"></span>
        <span id="status-text">接続中…</span>
      </div>
    </div>

    <div id="megurin-section">
      <h2>めぐりん リアルタイム</h2>
      <div class="megurin-row">
        <span class="megurin-label">バス表示</span>
        <span id="bus-count"></span>
        <label class="toggle-switch">
          <input type="checkbox" id="megurin-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div id="sim-controls">
        <div class="sim-row">
          <span style="font-size:11px;color:#64748b">速度</span>
          <button class="speed-btn" id="btn-speed-1x">1x</button>
          <button class="speed-btn" id="btn-speed-3x">3x</button>
          <button class="speed-btn active" id="btn-speed-10x">10x</button>
        </div>
        <div class="sim-row">
          <span style="font-size:11px;color:#64748b">時刻</span>
          <input type="range" id="sim-time-slider" min="21600" max="75600" step="60" value="43200">
          <span id="sim-time-display">12:00:00</span>
        </div>
      </div>
    </div>

    <div id="collections-scroll">
      <div id="collections-container"></div>
    </div>
  </div>

  <div id="map"></div>
  <div id="map-overlay">
    <button class="overlay-btn active" id="btn-tile-boundaries">タイル境界</button>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const STAC_API = 'https://poc-stac-tokyo-taito.yuiseki.com/stac';
const TILE_API = 'https://poc-stac-tokyo-taito.yuiseki.com';
const BASE_STYLE = 'https://tile.yuiseki.net/styles/osm-fiord/style.json';

const COLLECTION_COLORS = {
  'sports': '#f59e0b', 'kodomo-kyoiku': '#ec4899', 'bunka-geijutsu': '#a78bfa',
  'kurashi-sumai': '#34d399', 'kenko-iryo': '#f87171', 'kanko': '#38bdf8', 'infra': '#fb923c',
};
function colColor(id) { return COLLECTION_COLORS[id] || '#94a3b8'; }

// --- State ---
let map;
let allItems = {};       // itemId → item
let allCollections = []; // collection objects
let activeDatasets = new Set();
let megurinActive = false;
let megurinTimer = null;
let simMode = 'realtime';
let simSpeed = 10;          // 1, 3, or 10
let simRefWallMs = 0;       // wall-clock ms when fast mode started
let simRefSecs = 0;         // stateTileSecs at that moment

// Current simulation time (seconds from midnight) — read by the protocol handler
let stateTileSecs = 0;

// Register custom protocol: stateTile://z/x/y
// The handler fetches the real MVT endpoint with the current stateTileSecs value
// and returns a short TTL so MapLibre auto-revalidates using stale-while-revalidate,
// avoiding setTiles() which would disrupt the render loop.
maplibregl.addProtocol('stateTile', async (params, abortController) => {
  const [, path] = params.url.split('://');
  const [z, x, y] = path.split('/').map(Number);
  try {
    const resp = await fetch(
      `${TILE_API}/state/${z}/${x}/${y}?seconds=${stateTileSecs}`,
      { signal: abortController.signal }
    );
    if (!resp.ok) return { data: new ArrayBuffer(0) };
    const data = await resp.arrayBuffer();
    // Short TTL: MapLibre keeps old tile visible while re-fetching the next state
    return { data, expires: new Date(Date.now() + 1500) };
  } catch {
    return { data: new ArrayBuffer(0) };
  }
});

// --- Map init ---
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: BASE_STYLE,
    center: [139.7810, 35.7138],
    zoom: 13.5,
  });
  map.addControl(new maplibregl.NavigationControl(), 'top-right');

  map.on('style.load', () => {
    map.showTileBoundaries = true;
    addMvtSource();
    readdActiveDatasets();
    if (megurinActive) setupMegurinLayers();
  });
}

// --- MVT source ---
function addMvtSource() {
  if (!map.getSource('taito-mvt')) {
    map.addSource('taito-mvt', {
      type: 'vector',
      tiles: [`${TILE_API}/tiles/{z}/{x}/{y}`],
      minzoom: 0, maxzoom: 18,
    });
  }
}

function readdActiveDatasets() {
  for (const id of activeDatasets) addDatasetLayer(id);
}

// --- Dataset layers ---
function addDatasetLayer(itemId) {
  if (!map.getSource('taito-mvt')) addMvtSource();
  const layerId = `ds-${itemId}`;
  if (map.getLayer(layerId)) return;
  const item = allItems[itemId];
  const color = colColor(item?.collection);
  // insert below megurin layers so stacking order is: STAC < megurin < tile boundaries
  const megurinRef = map.getLayer('megurin-bus') ? 'megurin-bus' : undefined;
  const beforeId = megurinRef || undefined;
  map.addLayer({
    id: layerId,
    type: 'circle',
    source: 'taito-mvt',
    'source-layer': 'geojsonLayer',
    filter: ['==', ['get', 'dataset_id'], itemId],
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 3, 14, 6, 18, 10],
      'circle-color': color,
      'circle-opacity': 0.85,
      'circle-stroke-width': 1,
      'circle-stroke-color': '#fff',
    },
  }, beforeId);
  map.on('click', layerId, (e) => showPopup(e.features[0], e.lngLat));
  map.on('mouseenter', layerId, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', layerId, () => { map.getCanvas().style.cursor = ''; });
}

function removeDatasetLayer(itemId) {
  const layerId = `ds-${itemId}`;
  if (map.getLayer(layerId)) map.removeLayer(layerId);
}

function toggleDataset(itemId, el) {
  if (activeDatasets.has(itemId)) {
    activeDatasets.delete(itemId);
    removeDatasetLayer(itemId);
    el.classList.remove('active');
  } else {
    activeDatasets.add(itemId);
    addDatasetLayer(itemId);
    el.classList.add('active');
  }
}

// --- Popup ---
const SKIP_KEYS = new Set(['dataset_id', 'collection_id', 'dataset_title', 'original_id', 'id']);
function showPopup(feature, lngLat) {
  const props = feature.properties;
  const title = props['名称'] || props['施設名'] || props['文化財名称'] || props['dataset_title'] || '';
  let html = title ? `<div class="popup-title">${title}</div>` : '';
  for (const [k, v] of Object.entries(props)) {
    if (SKIP_KEYS.has(k) || v == null || v === '' || k === '名称') continue;
    html += `<div class="popup-row"><span class="popup-key">${k}</span><span class="popup-val">${v}</span></div>`;
  }
  new maplibregl.Popup({ closeButton: true, maxWidth: '300px' })
    .setLngLat(lngLat)
    .setHTML(html)
    .addTo(map);
}

// --- Sidebar render ---
function renderSidebar() {
  const container = document.getElementById('collections-container');
  container.innerHTML = '';

  for (const col of allCollections) {
    const items = Object.values(allItems).filter(i => i.collection === col.id);
    if (!items.length) continue;
    const color = colColor(col.id);

    const group = document.createElement('div');
    group.className = 'col-group';

    const header = document.createElement('div');
    header.className = 'col-header';
    header.innerHTML = `
      <span class="dataset-dot" style="background:${color}"></span>
      <span>${col.title || col.id}</span>
      <span class="col-caret">▶</span>`;

    const itemList = document.createElement('div');
    itemList.className = 'col-items';

    header.onclick = () => {
      const open = itemList.classList.toggle('open');
      header.querySelector('.col-caret').classList.toggle('open', open);
    };

    for (const item of items) {
      const el = document.createElement('div');
      el.className = 'dataset-item' + (activeDatasets.has(item.id) ? ' active' : '');
      el.id = `ds-item-${item.id}`;
      el.innerHTML = `<span class="dataset-dot" style="background:${color}"></span>${item.properties?.title || item.id}`;
      el.onclick = () => toggleDataset(item.id, el);
      itemList.appendChild(el);
    }

    group.appendChild(header);
    group.appendChild(itemList);
    container.appendChild(group);
  }
}

// --- STAC API fetch ---
async function fetchStac() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  try {
    const colsRes = await fetch(`${STAC_API}/collections`, { signal: AbortSignal.timeout(4000) });
    if (!colsRes.ok) throw new Error(`HTTP ${colsRes.status}`);
    const colsData = await colsRes.json();
    allCollections = colsData.collections || [];

    for (const col of allCollections) {
      const itemsRes = await fetch(`${STAC_API}/collections/${col.id}/items?limit=100`);
      const itemsData = await itemsRes.json();
      for (const item of (itemsData.features || [])) {
        allItems[item.id] = item;
      }
    }

    dot.className = 'online';
    txt.textContent = `オンライン — ${allCollections.length} コレクション`;
    // activate all datasets by default
    for (const id of Object.keys(allItems)) activeDatasets.add(id);
    renderSidebar();
    readdActiveDatasets();
  } catch (e) {
    dot.className = 'error';
    txt.textContent = 'API オフライン';
    console.error('STAC fetch failed:', e);
  }
}

// --- Megurin bus ---
function secsNow() {
  const n = new Date();
  return n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
}
function secsToHms(s) {
  const h = String(Math.floor(s / 3600)).padStart(2, '0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  return `${h}:${m}:${ss}`;
}

function makeMegurinIcon() {
  if (map.hasImage('megurin-sq')) return;
  const size = 32;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const r = 5, p = 4;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(p + r, p); ctx.lineTo(size - p - r, p);
  ctx.quadraticCurveTo(size - p, p, size - p, p + r);
  ctx.lineTo(size - p, size - p - r);
  ctx.quadraticCurveTo(size - p, size - p, size - p - r, size - p);
  ctx.lineTo(p + r, size - p);
  ctx.quadraticCurveTo(p, size - p, p, size - p - r);
  ctx.lineTo(p, p + r);
  ctx.quadraticCurveTo(p, p, p + r, p);
  ctx.closePath(); ctx.fill();
  map.addImage('megurin-sq', ctx.getImageData(0, 0, size, size), { sdf: true });
}

function setupMegurinLayers() {
  makeMegurinIcon();
  if (!map.getSource('megurin')) {
    map.addSource('megurin', {
      type: 'vector',
      tiles: ['stateTile://{z}/{x}/{y}'],
      minzoom: 0, maxzoom: 18,
    });
  }
  if (!map.getLayer('megurin-bus')) {
    map.addLayer({
      id: 'megurin-bus', type: 'symbol',
      source: 'megurin', 'source-layer': 'geojsonLayer',
      layout: {
        'icon-image': 'megurin-sq',
        'icon-size': ['interpolate', ['linear'], ['zoom'], 10, 0.4, 14, 0.7, 18, 1.0],
        'icon-allow-overlap': true, 'icon-ignore-placement': true,
      },
      paint: {
        'icon-color': ['coalesce', ['get', 'route_color'], '#4f46e5'],
        'icon-halo-color': '#fff', 'icon-halo-width': 2.5,
      },
    });
  }
  if (!map.getLayer('megurin-label')) {
    map.addLayer({
      id: 'megurin-label', type: 'symbol',
      source: 'megurin', 'source-layer': 'geojsonLayer',
      layout: {
        'text-field': ['get', 'route_name'], 'text-size': 11,
        'text-offset': [0, 1.6], 'text-allow-overlap': true,
      },
      paint: { 'text-color': '#fff', 'text-halo-color': '#1e293b', 'text-halo-width': 1.5 },
    });
  }
}

function removeMegurinLayers() {
  ['megurin-label', 'megurin-bus'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  if (map.getSource('megurin')) map.removeSource('megurin');
}

// Update stateTileSecs — the protocol handler reads this on every tile (re-)fetch.
// No setTiles() needed: MapLibre auto-revalidates tiles when their TTL (1.5s) expires.
function updateMegurin() {
  if (!megurinActive) return;
  if (simMode === 'custom') {
    stateTileSecs = parseInt(document.getElementById('sim-time-slider').value);
  } else if (simSpeed > 1) {
    stateTileSecs = Math.floor(simRefSecs + (Date.now() - simRefWallMs) / 1000 * simSpeed) % 86400;
    document.getElementById('sim-time-display').textContent = secsToHms(stateTileSecs);
  } else {
    stateTileSecs = secsNow();
  }
  // Reflect current feature count from rendered tiles
  const feats = map.querySourceFeatures('megurin', { sourceLayer: 'geojsonLayer' });
  const uniq = new Set(feats.map(f => JSON.stringify(f.geometry?.coordinates)));
  document.getElementById('bus-count').textContent = uniq.size ? `${uniq.size} 台` : '';
}

function startMegurin() {
  stateTileSecs = simMode === 'custom'
    ? parseInt(document.getElementById('sim-time-slider').value)
    : secsNow();
  simRefWallMs = Date.now();
  simRefSecs = stateTileSecs;
  setupMegurinLayers();
  updateMegurin();
  megurinTimer = setInterval(updateMegurin, simMode === 'custom' ? 5000 : 1500);
}

function stopMegurin() {
  clearInterval(megurinTimer);
  megurinTimer = null;
  removeMegurinLayers();
  document.getElementById('bus-count').textContent = '';
}

// --- Init ---
window.addEventListener('load', () => {
  initMap();
  fetchStac();

  // Tile boundaries toggle (default ON)
  const tileBtn = document.getElementById('btn-tile-boundaries');
  tileBtn.onclick = () => {
    map.showTileBoundaries = !map.showTileBoundaries;
    tileBtn.classList.toggle('active', map.showTileBoundaries);
  };

  // Megurin toggle (default ON after map loads)
  const toggle = document.getElementById('megurin-toggle');
  const simControls = document.getElementById('sim-controls');

  map.once('style.load', () => {
    // Auto-start megurin
    toggle.checked = true;
    megurinActive = true;
    simControls.classList.add('visible');
    startMegurin();
  });

  toggle.onchange = () => {
    megurinActive = toggle.checked;
    simControls.classList.toggle('visible', megurinActive);
    if (megurinActive) startMegurin(); else stopMegurin();
  };

  // Simulation mode: realtime when slider at default, custom when dragged
  const slider = document.getElementById('sim-time-slider');
  const display = document.getElementById('sim-time-display');
  slider.oninput = () => {
    simMode = 'custom';
    display.textContent = secsToHms(parseInt(slider.value));
    clearInterval(megurinTimer);
    megurinTimer = setInterval(updateMegurin, 5000);
    updateMegurin();
  };

  // Speed buttons
  function setSpeed(speed) {
    simSpeed = speed;
    simRefWallMs = Date.now();
    simRefSecs = stateTileSecs || secsNow();
    document.getElementById('btn-speed-1x').classList.toggle('active', speed === 1);
    document.getElementById('btn-speed-3x').classList.toggle('active', speed === 3);
    document.getElementById('btn-speed-10x').classList.toggle('active', speed === 10);
    // If slider was customized, stay in custom mode; otherwise go realtime-based
    if (simMode !== 'custom') simMode = 'realtime';
  }
  document.getElementById('btn-speed-1x').onclick = () => setSpeed(1);
  document.getElementById('btn-speed-3x').onclick = () => setSpeed(3);
  document.getElementById('btn-speed-10x').onclick = () => setSpeed(10);

  // Keep realtime display updated
  setInterval(() => {
    if (simMode === 'realtime' && simSpeed === 1) display.textContent = secsToHms(secsNow());
  }, 1000);
});
</script>
</body>
</html>
