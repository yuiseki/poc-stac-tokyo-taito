        // Realtime attributes & text search mechanism
        function initSearch() {
            const searchInput = document.getElementById('poi-search');
            const searchSec = document.getElementById('search-results-sec');
            const resultsList = document.getElementById('search-results');
            const searchCountBadge = document.getElementById('search-count');
            const closeBtn = document.getElementById('btn-close-search');

            closeBtn.onclick = () => {
                searchInput.value = '';
                searchSec.style.display = 'none';
                resultsList.innerHTML = '';
            };

            searchInput.oninput = async () => {
                const query = searchInput.value.trim().toLowerCase();
                if (!query) {
                    searchSec.style.display = 'none';
                    resultsList.innerHTML = '';
                    return;
                }

                // If online, lazy load GeoJSON for active layers to search locally
                if (isApiOnline) {
                    const pendingLoads = [];
                    activeSources.forEach(id => {
                        if (!loadedGeoJsonData[id]) {
                            const item = allItems.find(i => i.id === id);
                            if (item && item.geojson) {
                                pendingLoads.push(
                                    fetch(item.geojson)
                                        .then(res => res.json())
                                        .then(data => {
                                            loadedGeoJsonData[id] = data;
                                        })
                                        .catch(err => console.error(`Error lazy loading ${id} for search`, err))
                                );
                            }
                        }
                    });

                    if (pendingLoads.length > 0) {
                        resultsList.innerHTML = `
                            <div style="padding: 12px; font-size:12px; color:var(--text-secondary); text-align:center;">
                                検索データを読み込み中...
                            </div>
                        `;
                        searchSec.style.display = 'block';
                        searchCountBadge.innerText = '...';
                        await Promise.all(pendingLoads);
                    }
                }

                // Search across loaded datasets
                let results = [];

                for (const [datasetId, geojson] of Object.entries(loadedGeoJsonData)) {
                    // Only search active layers when online
                    if (isApiOnline && !activeSources.has(datasetId)) continue;

                    const item = allItems.find(i => i.id === datasetId);
                    if (!geojson || !geojson.features) continue;

                    geojson.features.forEach(feat => {
                        const props = feat.properties;
                        const name = props['名称'] || props['施設名'] || props['文化財名称'] || '';
                        const address = props['所在地_連結表記'] || props['住所'] || props['所在地'] || '';
                        
                        if (name.toLowerCase().includes(query) || address.toLowerCase().includes(query)) {
                            results.push({
                                name,
                                address,
                                coordinates: feat.geometry.coordinates,
                                feature: feat,
                                datasetId,
                                collection: item ? item.collection : ''
                            });
                        }
                    });
                }

                // If nothing was loaded or no active layers, show a hint
                if (Object.keys(loadedGeoJsonData).length === 0 || (isApiOnline && activeSources.size === 0)) {
                    resultsList.innerHTML = `
                        <div style="padding: 12px; font-size:12px; color:var(--text-secondary); text-align:center;">
                            レイヤーを有効にすると、そのレイヤーをリアルタイムでテキスト検索できるようになります！
                        </div>
                    `;
                    searchSec.style.display = 'block';
                    searchCountBadge.innerText = '0';
                    return;
                }

                // Render matching items
                resultsList.innerHTML = '';
                if (results.length === 0) {
                    resultsList.innerHTML = `<div style="padding: 12px; font-size:12px; color:var(--text-secondary); text-align:center;">一致する施設が見つかりません。</div>`;
                } else {
                    // Limit to top 20 results for performance
                    results.slice(0, 20).forEach(res => {
                        const colColor = getCollectionColor(res.collection);
                        const li = document.createElement('li');
                        li.className = 'search-result-item';
                        li.innerHTML = `
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div style="width:6px; height:6px; border-radius:50%; background-color:${colColor};"></div>
                                <span class="search-result-name">${res.name}</span>
                            </div>
                            <span class="search-result-detail">${res.address || '台東区内'}</span>
                        `;
                        li.onclick = () => {
                            map.flyTo({
                                center: res.coordinates,
                                zoom: 17,
                                duration: 1200
                            });
                            showPopup(res.feature, colColor, allItems.find(i => i.id === res.datasetId));
                        };
                        resultsList.appendChild(li);
                    });
                }

                searchSec.style.display = 'block';
                searchCountBadge.innerText = results.length;
            };
        }

        // STAC BBox Query (Demonstrates STAC spatial capabilities via API `/search`)
        async function runBboxSearch() {
            if (!isApiOnline) {
                alert('STAC APIサーバーがオフラインです。空間検索は現在オンラインモードのみ有効です。');
                return;
            }

            const bounds = map.getBounds();
            const minLon = bounds.getWest().toFixed(5);
            const minLat = bounds.getSouth().toFixed(5);
            const maxLon = bounds.getEast().toFixed(5);
            const maxLat = bounds.getNorth().toFixed(5);

            const bboxStr = `${minLon},${minLat},${maxLon},${maxLat}`;
            
            try {
                // Fetch search items crossing current viewport from STAC API
                const url = `${STAC_API_URL}/search?bbox=${bboxStr}&limit=50`;
                const response = await fetch(url);
                const data = await response.json();

                const drawer = document.getElementById('spatial-drawer');
                const list = document.getElementById('spatial-results-list');
                list.innerHTML = '';

                // Draw bounding boxes of found items on the map!
                // Clear old bbox source & layer if exists
                if (map.getLayer('search-bbox-layer')) map.removeLayer('search-bbox-layer');
                if (map.getLayer('search-bbox-line-layer')) map.removeLayer('search-bbox-line-layer');
                if (map.getSource('search-bbox')) map.removeSource('search-bbox');

                if (data && data.features && data.features.length > 0) {
                    const features = data.features;
                    
                    // Create features of bbox rectangles
                    const bboxFeatures = features.map(item => {
                        const [w, s, e, n] = item.bbox;
                        return {
                            type: 'Feature',
                            properties: {
                                title: item.properties.title,
                                collection: item.collection
                            },
                            geometry: {
                                type: 'Polygon',
                                coordinates: [[
                                    [w, s],
                                    [e, s],
                                    [e, n],
                                    [w, n],
                                    [w, s]
                                ]]
                            }
                        };
                    });

                    // Add bounding boxes geometry to show spatial extent of matching STAC collections!
                    map.addSource('search-bbox', {
                        type: 'geojson',
                        data: {
                            type: 'FeatureCollection',
                            features: bboxFeatures
                        }
                    });

                    map.addLayer({
                        id: 'search-bbox-layer',
                        type: 'fill',
                        source: 'search-bbox',
                        paint: {
                            'fill-color': 'var(--accent)',
                            'fill-opacity': 0.08
                        }
                    });

                    map.addLayer({
                        id: 'search-bbox-line-layer',
                        type: 'line',
                        source: 'search-bbox',
                        paint: {
                            'line-color': 'var(--accent)',
                            'line-width': 1.8,
                            'line-dasharray': [3, 2]
                        }
                    });

                    // Render list inside results drawer
                    features.forEach(item => {
                        const colColor = getCollectionColor(item.collection);
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'spatial-item';
                        itemDiv.innerHTML = `
                            <div class="spatial-item-title">${item.properties.title}</div>
                            <div class="spatial-item-collection" style="color: ${colColor};">${item.collection}</div>
                            <div style="font-size:10px; color:var(--text-secondary); margin-top:2px;">
                                更新日時: ${new Date(item.properties.datetime).toLocaleDateString()}
                            </div>
                        `;
                        itemDiv.onclick = async () => {
                            // Enable this dataset layer on the map!
                            const assetGeojson = resolveGeoJsonUrl(item.assets.geojson.href);
                            if (!activeSources.has(item.id)) {
                                await toggleDataset(item.id, assetGeojson, colColor);
                                renderLayers();
                            } else {
                                zoomToDataset(item.id);
                            }
                        };
                        list.appendChild(itemDiv);
                    });

                    drawer.classList.add('active');
                } else {
                    list.innerHTML = `
                        <div style="padding:16px; text-align:center; font-size:12px; color:var(--text-secondary);">
                            この表示範囲には登録済みのSTAC Itemはありません。
                        </div>
                    `;
                    drawer.classList.add('active');
                }

            } catch(e) {
                console.error('Failed to execute STAC Spatial bbox search:', e);
                alert('空間検索中にエラーが発生しました。STAC APIサーバーの状態を確認してください。');
            }
        }

        // Register DOM Event Listeners
        function registerUiEvents() {
            // Floating style switcher
            const styleBtns = document.querySelectorAll('.style-option-btn');
            styleBtns.forEach(btn => {
                btn.onclick = () => {
                    styleBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const styleKey = btn.getAttribute('data-style');
                    
                    // Switch base tile style cleanly
                    map.setStyle(baseStyles[styleKey]);

                    // MapLibre on style load needs to re-add existing custom layers and sources!
                    map.once('style.load', () => {
                        if (isApiOnline) {
                            // Ensure vector tile source is added
                            const tileUrl = STAC_API_URL.replace('/stac', '') + '/tiles/{z}/{x}/{y}';
                            map.addSource('taito-mvt-source', {
                                type: 'vector',
                                tiles: [tileUrl],
                                minzoom: 0,
                                maxzoom: 18
                            });
                        }

                        // Re-register Megurin Realtime if active
                        if (isMegurinRealtimeActive) {
                            const serverBase = STAC_API_URL.replace('/stac', '');
                            
                            // Re-register SDF image if not exists
                            if (!map.getImage('megurin-square-sdf')) {
                                const size = 32;
                                const canvas = document.createElement('canvas');
                                canvas.width = size;
                                canvas.height = size;
                                const ctx = canvas.getContext('2d');
                                
                                const radius = 6;
                                const pad = 4;
                                
                                ctx.beginPath();
                                ctx.moveTo(pad + radius, pad);
                                ctx.lineTo(size - pad - radius, pad);
                                ctx.quadraticCurveTo(size - pad, pad, size - pad, pad + radius);
                                ctx.lineTo(size - pad, size - pad - radius);
                                ctx.quadraticCurveTo(size - pad, size - pad, size - pad - radius, size - pad);
                                ctx.lineTo(pad + radius, size - pad);
                                ctx.quadraticCurveTo(pad, size - pad, pad, size - pad - radius);
                                ctx.lineTo(pad, pad + radius);
                                ctx.quadraticCurveTo(pad, pad, pad + radius, pad);
                                ctx.closePath();
                                
                                ctx.fillStyle = '#000000';
                                ctx.fill();
                                
                                const imgData = ctx.getImageData(0, 0, size, size);
                                map.addImage('megurin-square-sdf', imgData, { sdf: true });
                            }

                            if (!map.getSource('megurin-realtime-source')) {
                                map.addSource('megurin-realtime-source', {
                                    type: 'geojson',
                                    data: { type: 'FeatureCollection', features: [] }
                                });
                            }
                            if (!map.getLayer('megurin-realtime-bus-layer')) {
                                map.addLayer({
                                    id: 'megurin-realtime-bus-layer',
                                    type: 'symbol',
                                    source: 'megurin-realtime-source',
                                    layout: {
                                        'icon-image': 'megurin-square-sdf',
                                        'icon-size': [
                                            'interpolate',
                                            ['linear'],
                                            ['zoom'],
                                            10, 0.4,
                                            14, 0.7,
                                            18, 1.0
                                        ],
                                        'icon-allow-overlap': true,
                                        'icon-ignore-placement': true
                                    },
                                    paint: {
                                        'icon-color': ['coalesce', ['get', 'route_color'], '#4f46e5'],
                                        'icon-halo-color': '#ffffff',
                                        'icon-halo-width': 2.5
                                    }
                                });
                            }
                            if (!map.getLayer('megurin-realtime-label-layer')) {
                                map.addLayer({
                                    id: 'megurin-realtime-label-layer',
                                    type: 'symbol',
                                    source: 'megurin-realtime-source',
                                    layout: {
                                        'text-field': ['get', 'route_name'],
                                        'text-size': 11,
                                        'text-offset': [0, 1.6],
                                        'text-anchor': 'top',
                                        'text-allow-overlap': true,
                                        'text-ignore-placement': true
                                    },
                                    paint: {
                                        'text-color': '#ffffff',
                                        'text-halo-color': 'rgba(8, 12, 20, 0.9)',
                                        'text-halo-width': 2.0
                                    }
                                });
                            }
                            
                            // Immediately fetch and draw coordinates after layer re-addition (prevents flicker on style change)
                            updateMegurinPositions();
                        }

                        // Re-register all currently active sources and layers!
                        activeSources.forEach(async (id) => {
                            const item = allItems.find(i => i.id === id);
                            const color = getCollectionColor(item ? item.collection : '');
                            
                            if (isApiOnline) {
                                if (!map.getLayer(`${id}-layer`)) {
                                    map.addLayer({
                                        id: `${id}-layer`,
                                        type: 'circle',
                                        source: 'taito-mvt-source',
                                        'source-layer': 'geojsonLayer',
                                        filter: ['==', ['get', 'dataset_id'], id],
                                        paint: {
                                            'circle-radius': [
                                                'interpolate',
                                                ['linear'],
                                                ['zoom'],
                                                10, 4,
                                                14, 7,
                                                18, 12
                                            ],
                                            'circle-color': color,
                                            'circle-stroke-width': 1.8,
                                            'circle-stroke-color': '#ffffff',
                                            'circle-opacity': 0.85
                                        }
                                    });
                                }
                            } else {
                                const geojsonData = loadedGeoJsonData[id];
                                if (geojsonData) {
                                    if (!map.getSource(id)) {
                                        map.addSource(id, {
                                            type: 'geojson',
                                            data: geojsonData
                                        });
                                    }
                                    if (!map.getLayer(`${id}-layer`)) {
                                        map.addLayer({
                                            id: `${id}-layer`,
                                            type: 'circle',
                                            source: id,
                                            paint: {
                                                'circle-radius': [
                                                    'interpolate',
                                                    ['linear'],
                                                    ['zoom'],
                                                    10, 4,
                                                    14, 7,
                                                    18, 12
                                                ],
                                                'circle-color': color,
                                                'circle-stroke-width': 1.8,
                                                'circle-stroke-color': '#ffffff',
                                                'circle-opacity': 0.85
                                            }
                                        });
                                    }
                                }
                            }
                        });
                    });
                };
            });

            // Quick Eye action: Clear all layers
            document.getElementById('btn-clear').onclick = () => {
                const idsToRemove = Array.from(activeSources);
                idsToRemove.forEach(id => {
                    if (map.getLayer(`${id}-layer`)) map.removeLayer(`${id}-layer`);
                    if (map.getSource(id)) map.removeSource(id);
                    activeSources.delete(id);
                });
                renderLayers();
            };

            // Quick Eye action: Toggle all target layers
            document.getElementById('btn-all').onclick = async () => {
                for (const item of allItems) {
                    if (!activeSources.has(item.id)) {
                        const colColor = getCollectionColor(item.collection);
                        await toggleDataset(item.id, item.geojson, colColor, false);
                    }
                }
                renderLayers();
            };

            // Spatial Search triggers
            document.getElementById('btn-bbox-search').onclick = runBboxSearch;

            // Toggle Tile Boundaries (debugging grid helper)
            const tileBoundsBtn = document.getElementById('btn-tile-boundaries');
            tileBoundsBtn.onclick = () => {
                const isShowing = map.showTileBoundaries;
                map.showTileBoundaries = !isShowing;
                tileBoundsBtn.classList.toggle('active', !isShowing);
            };
            document.getElementById('spatial-close-btn').onclick = () => {
                document.getElementById('spatial-drawer').classList.remove('active');
                // Remove visual bbox glowing borders on map
                if (map.getLayer('search-bbox-layer')) map.removeLayer('search-bbox-layer');
                if (map.getLayer('search-bbox-line-layer')) map.removeLayer('search-bbox-line-layer');
                if (map.getSource('search-bbox')) map.removeSource('search-bbox');
            };

            // Mobile view drawer toggle
            const sidebar = document.getElementById('sidebar');
            const mobileBtn = document.getElementById('mobile-sidebar-toggle');
            const mobileIcon = document.getElementById('mobile-toggle-icon');

            mobileBtn.onclick = () => {
                sidebar.classList.toggle('active');
                if (sidebar.classList.contains('active')) {
                    mobileIcon.setAttribute('data-lucide', 'x');
                } else {
                    mobileIcon.setAttribute('data-lucide', 'menu');
                }
                lucide.createIcons();
            };
        }

        // Global Bootstrapper
        window.onload = async () => {
            // 1. Fetch dynamic metadata
            await fetchCatalogAndLoad();
            
            // 2. Load MapLibre
            initMap();
            
            // 3. Register Search filter
            initSearch();

            // 3.5. Register Megurin Simulator UI
            initMegurinRealtimeUI();
            
            // 4. Connect general clicks
            registerUiEvents();
            
            // Render icons
            lucide.createIcons();
        };
    </script>
</body>
</html>
