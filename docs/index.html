<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAITO STAC GEOPORTAL — 台東区オープンデータ STAC ジオポータル</title>
    
    <!-- Meta Descriptions for SEO -->
    <meta name="description" content="台東区のオープンデータ(CSV)をSTAC(SpatioTemporal Asset Catalog)規格に変換し、MapLibre GL JS地図ビューワーで可視化するモダンなWeb GISアプリケーション。">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- MapLibre GL JS CSS & JS -->
    <link href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.379.0/dist/umd/lucide.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #080c14;
            --bg-sidebar: rgba(13, 20, 38, 0.85);
            --bg-card: rgba(22, 33, 54, 0.45);
            --bg-card-hover: rgba(31, 46, 74, 0.7);
            --bg-input: rgba(16, 24, 43, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.25);
            
            /* Collection Colors */
            --color-sports: #10b981;
            --color-kodomo: #a78bfa;
            --color-bunka: #3b82f6;
            --color-infra: #06b6d4;
            --color-kanko: #fbbf24;
            --color-kenko: #f472b6;
            --color-kurashi: #f43f5e;
            
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #app-container {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Sidebar Glassmorphism */
        #sidebar {
            width: 420px;
            height: 100%;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            transition: var(--transition-smooth);
        }

        /* Map Container */
        #map {
            flex: 1;
            height: 100%;
            position: relative;
        }

        /* Header Area */
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            color: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .logo-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Connection Status Badge */
        .status-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e2e8f0;
        }

        .status-dot.active {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.warning {
            background-color: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
        }

        .status-dot.error {
            background-color: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .status-text {
            color: var(--text-secondary);
            font-weight: 500;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Search Section */
        .search-container {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px 10px 40px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        /* Quick Controls (Clear All, BBox Search etc) */
        .controls-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 11.5px;
            font-weight: 600;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition-smooth);
            font-family: inherit;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .btn-accent {
            background: var(--accent);
            color: #ffffff;
            border: none;
        }

        .btn-accent:hover {
            background: #4338ca;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.4);
        }

        /* Content List Scrollable Area */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        /* Custom Scrollbar for premium feel */
        .sidebar-content::-webkit-scrollbar {
            width: 5px;
        }
        .sidebar-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Section Titles */
        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* STAC Collections / Accordion list */
        .collection-group {
            margin-bottom: 12px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .collection-group.expanded {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .collection-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            user-select: none;
            transition: var(--transition-smooth);
        }

        .collection-header:hover {
            background: rgba(255,255,255,0.02);
        }

        .collection-title-side {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .collection-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
        }

        .collection-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .collection-meta {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 12px;
        }

        .collection-chevron {
            color: var(--text-secondary);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .collection-group.expanded .collection-chevron {
            transform: rotate(180deg);
        }

        /* Datasets list inside Collection */
        .collection-datasets {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.2);
            border-top: 0 solid var(--border-color);
        }

        .collection-group.expanded .collection-datasets {
            max-height: 500px; /* Adjust dynamically as needed */
            border-top-width: 1px;
        }

        .dataset-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: var(--transition-smooth);
        }

        .dataset-item:last-child {
            border-bottom: none;
        }

        .dataset-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Checkbox styling */
        .custom-checkbox {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid var(--text-muted);
            cursor: pointer;
            margin-top: 2px;
            transition: var(--transition-smooth);
            background: rgba(0,0,0,0.2);
        }

        .custom-checkbox input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .custom-checkbox.checked::after {
            display: block;
        }

        .dataset-info {
            flex: 1;
            cursor: pointer;
        }

        .dataset-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .dataset-title {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .dataset-desc {
            font-size: 11.5px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .zoom-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .zoom-btn:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.06);
        }

        /* Map UI Overlay (Floating Style Switcher) */
        .map-overlay-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 5;
            background: rgba(13, 20, 38, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .style-option-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-smooth);
        }

        .style-option-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .style-option-btn.active {
            background: var(--accent);
            color: #ffffff;
        }

        /* Search Results Panel inside Sidebar */
        .search-results-section {
            margin-bottom: 16px;
        }

        .search-results-list {
            list-style: none;
            margin-top: 8px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.15);
        }

        .search-result-item {
            padding: 10px 12px;
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 2px;
            transition: var(--transition-smooth);
        }

        .search-result-item:hover {
            background: rgba(255,255,255,0.04);
        }

        .search-result-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .search-result-detail {
            color: var(--text-secondary);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Spatial Search Drawer (Bbox overlay panel) */
        .spatial-search-overlay {
            position: absolute;
            bottom: 20px;
            left: 440px;
            z-index: 5;
            background: rgba(13, 20, 38, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: var(--transition-smooth);
            transform: translateY(120%);
            opacity: 0;
            pointer-events: none;
        }

        .spatial-search-overlay.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .spatial-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .spatial-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .spatial-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .spatial-close:hover {
            color: var(--text-primary);
        }

        .spatial-results {
            font-size: 12px;
            color: var(--text-secondary);
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .spatial-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .spatial-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .spatial-item-title {
            font-weight: 600;
            color: var(--text-primary);
        }

        .spatial-item-collection {
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 2px;
        }

        /* MapLibre Popup Customizations */
        .maplibregl-popup-content {
            background: rgba(11, 15, 28, 0.9) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 18px !important;
            color: var(--text-primary) !important;
            box-shadow: 0 10px 35px rgba(0,0,0,0.6) !important;
            max-width: 320px !important;
        }

        .maplibregl-popup-anchor-top .maplibregl-popup-tip { border-bottom-color: rgba(11, 15, 28, 0.9) !important; }
        .maplibregl-popup-anchor-bottom .maplibregl-popup-tip { border-top-color: rgba(11, 15, 28, 0.9) !important; }
        .maplibregl-popup-anchor-left .maplibregl-popup-tip { border-right-color: rgba(11, 15, 28, 0.9) !important; }
        .maplibregl-popup-anchor-right .maplibregl-popup-tip { border-left-color: rgba(11, 15, 28, 0.9) !important; }

        .maplibregl-popup-close-button {
            color: var(--text-secondary) !important;
            font-size: 16px !important;
            right: 8px !important;
            top: 8px !important;
            width: 24px !important;
            height: 24px !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
            transition: var(--transition-smooth) !important;
        }

        .maplibregl-popup-close-button:hover {
            color: var(--text-primary) !important;
            background: rgba(255,255,255,0.06) !important;
        }

        /* Popup Content Styles */
        .popup-header {
            margin-bottom: 12px;
            padding-right: 14px;
        }

        .popup-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .popup-collection-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            color: #ffffff;
        }

        .popup-body {
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .popup-row {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .popup-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .popup-val {
            font-size: 12.5px;
            color: var(--text-primary);
            word-break: break-all;
            line-height: 1.3;
        }

        .popup-val a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .popup-val a:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .popup-actions {
            display: flex;
            gap: 6px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
        }

        .popup-actions .btn {
            padding: 6px;
            font-size: 11px;
        }

        /* Mobile Drawer Toggle & Support */
        .mobile-toggle {
            display: none;
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 15;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: #ffffff;
            border: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: var(--transition-smooth);
        }

        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                width: 100%;
                max-width: 350px;
            }

            #sidebar.active {
                transform: translateX(0);
            }

            .spatial-search-overlay {
                left: 20px;
                width: calc(100% - 40px);
            }

            .mobile-toggle {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <!-- Header -->
            <div class="sidebar-header">
                <div class="logo-row">
                    <i data-lucide="map" class="logo-icon" width="24" height="24"></i>
                    <h1 class="logo-title">TAITO STAC</h1>
                </div>
                <div class="logo-subtitle">SpatioTemporal Asset Catalog</div>
                
                <div class="status-row">
                    <div id="status-dot" class="status-dot"></div>
                    <span id="status-text" class="status-text">STAC API: 接続確認中...</span>
                </div>
            </div>

            <!-- Search Area -->
            <div class="search-container">
                <div class="search-box">
                    <i data-lucide="search" width="16" height="16"></i>
                    <input type="text" id="poi-search" placeholder="施設名や住所で検索..." autocomplete="off">
                </div>
                
                <!-- Quick controls -->
                <div class="controls-row">
                    <button class="btn" id="btn-clear">
                        <i data-lucide="eye-off" width="14" height="14"></i>非表示
                    </button>
                    <button class="btn" id="btn-all">
                        <i data-lucide="eye" width="14" height="14"></i>すべて表示
                    </button>
                    <button class="btn btn-accent" id="btn-bbox-search">
                        <i data-lucide="focus" width="14" height="14"></i>範囲内を検索
                    </button>
                </div>
            </div>

            <!-- Scrollable Content Area -->
            <div class="sidebar-content">
                <!-- Search results dynamic section -->
                <div class="search-results-section" id="search-results-sec" style="display: none;">
                    <div class="section-title">
                        <span>検索結果 (<span id="search-count">0</span>)</span>
                        <button class="zoom-btn" id="btn-close-search" title="検索を閉じる">
                            <i data-lucide="x" width="12" height="12"></i>
                        </button>
                    </div>
                    <ul class="search-results-list" id="search-results">
                        <!-- Dynamic items -->

    <script>
        // Configuration

        // Static Fallbacks (used if API is offline)
        const FALLBACK_COLLECTIONS = [

        const FALLBACK_ITEMS = [
            { id: "t131067d2025000006", collection: "kenko-iryo", title: "理容所台帳", geojson: "data/t131067d2025000006.geojson" },
            { id: "t131067d2025000003", collection: "infra", title: "都市公園・都立公園一覧", geojson: "data/t131067d2025000003.geojson" },
            { id: "t131067d0000000256", collection: "kenko-iryo", title: "銭湯", geojson: "data/t131067d0000000256.geojson" },
            { id: "t131067d0000000231", collection: "kurashi-sumai", title: "福祉施設", geojson: "data/t131067d0000000231.geojson" },

            { id: "t131067d2025000004", collection: "kanko", title: "宿泊施設（旅館台帳）", geojson: "data/t131067d2025000004.geojson" },
            { id: "t131067d3100000001", collection: "kodomo-kyoiku", title: "子ども食堂一覧", geojson: "data/t131067d3100000001.geojson" },
            { id: "t131067d0000000230", collection: "kurashi-sumai", title: "救急医療機関", geojson: "data/t131067d0000000230.geojson" },
            { id: "t131067d3100000005", collection: "bunka-geijutsu", title: "公立図書館情報", geojson: "data/t131067d3100000005.geojson" },
            { id: "t131067d2025000007", collection: "kenko-iryo", title: "美容所台帳", geojson: "data/t131067d2025000007.geojson" },
            { id: "t131067d2025000005", collection: "kenko-iryo", title: "クリーニング所台帳", geojson: "data/t131067d2025000005.geojson" },
            { id: "t131067d0000000393", collection: "bunka-geijutsu", title: "文化財一覧", geojson: "data/t131067d0000000393.geojson" }
        ];

        // MapLibre tile style definitions (Pure offline/raster approach for premium stability)
        const baseStyles = {
            dark: {

                    }

                ]
            },
            light: {
                version: 8,
                sources: {

                        tileSize: 256,

                    }

                    }
                },
                layers: [
                    { id: "osm-layer", type: "raster", source: "osm", minzoom: 0, maxzoom: 19 }
                ]
            }
        };

        // Application State
        let map;
        let isApiOnline = false;
        let activeSources = new Set();  // Set of active GeoJSON dataset IDs
        let loadedGeoJsonData = {};     // Map of datasetId -> full GeoJSON content
        let allCollections = [];        // Loaded STAC Collections
        let allItems = [];              // Loaded STAC Items

        // Megurin Realtime Simulation State
        let isMegurinRealtimeActive = false;
        let megurinRealtimeTimer = null;
        let megurinSimMode = 'realtime'; // 'realtime' or 'custom'
        let megurinSimSeconds = 43200;    // Default to 12:00:00 (midday) in seconds

        // Helper: Resolve GeoJSON URL from STAC Asset href
        function resolveGeoJsonUrl(href) {
            if (!href) return '';
            let url = href;
            // Handle absolute / relative formats elegantly
            if (href.startsWith('/docs/')) {
                url = href.substring(6); // "data/..."
            } else if (href.startsWith('docs/')) {
                url = href.substring(5); // "data/..."
            }
            return url;
        }

        // Helper: Get Collection Color
        function getCollectionColor(collectionId) {
            switch(collectionId) {
                case 'sports': return '#10b981';       // Emerald
                case 'kodomo-kyoiku': return '#a78bfa'; // Violet
                case 'bunka-geijutsu': return '#3b82f6';// Blue
                case 'infra': return '#06b6d4';        // Cyan
                case 'kanko': return '#fbbf24';        // Amber
                case 'kenko-iryo': return '#f472b6';   // Pink
                case 'kurashi-sumai': return '#f43f5e'; // Rose
                default: return '#4f46e5';             // Indigo
            }
        }

        // Helper: Get Collection Icon
        function getCollectionIcon(collectionId) {
            switch(collectionId) {
                case 'sports': return 'activity';
                case 'kodomo-kyoiku': return 'baby';
                case 'bunka-geijutsu': return 'palette';
                case 'infra': return 'map';
                case 'kanko': return 'compass';
                case 'kenko-iryo': return 'heart-pulse';
                case 'kurashi-sumai': return 'home';
                default: return 'layers';
            }
        }

        // Check STAC API Server Connection
        async function checkStacApi() {
            try {
                const response = await fetch(`${STAC_API_URL}/collections`, { signal: AbortSignal.timeout(2000) });
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.collections) {
                        isApiOnline = true;
                        updateStatusBadge('online', 'STAC API: オンライン (ポート8082)');
                        return;
                    }
                }
            } catch(e) {
                console.warn('FastAPI STAC API is offline, falling back to static files.', e);
            }
            isApiOnline = false;
            updateStatusBadge('warning', 'STAC API: オフライン (静的ファイルフォールバック)');
        }

        // Update UI Status Badge
        function updateStatusBadge(status, text) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            dot.className = 'status-dot';
            if (status === 'online') {
                dot.classList.add('active');
            } else if (status === 'warning') {
                dot.classList.add('warning');
            } else {
                dot.classList.add('error');
            }
            txt.innerText = text;
        }

        // Initialize MapLibre GL
        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: baseStyles.dark, // Start with dark theme
                center: [139.7810, 35.7138], // Taito-ku Office coordinate
                zoom: 13.5,
                maxZoom: 19,
                minZoom: 10
            });

            // Add Standard Map Controls
            map.addControl(new maplibregl.NavigationControl({ showCompass: true, visualizePitch: true }), 'top-left');
            map.addControl(new maplibregl.ScaleControl({ maxWidth: 100, unit: 'metric' }), 'bottom-right');

            map.on('load', async () => {
                console.log('MapLibre fully loaded. Activating all layers by default...');
                
                // Activate all layers by default on initial map load
                for (const item of allItems) {
                    const color = getCollectionColor(item.collection);
                    await toggleDataset(item.id, item.geojson, color, false);
                }
                
                // Trigger rendering to update checkboxes in the sidebar
                renderLayers();
            });

            // Setup global click event on map layers
            map.on('click', (e) => {
                // Build query layers list
                let layersToQuery = Array.from(activeSources)
                    .map(id => `${id}-layer`)
                    .filter(layerId => map.getLayer(layerId));
                
                if (isMegurinRealtimeActive && map.getLayer('megurin-realtime-bus-layer')) {
                    layersToQuery.push('megurin-realtime-bus-layer');
                }
                
                if (layersToQuery.length === 0) return;

                const features = map.queryRenderedFeatures(e.point, {
                    layers: layersToQuery
                });

                if (!features.length) return;

                const feature = features[0];
                const layerId = feature.layer.id;
                
                if (layerId === 'megurin-realtime-bus-layer') {
                    showBusPopup(feature);
                } else {
                    const datasetId = layerId.replace('-layer', '');
                    const item = allItems.find(i => i.id === datasetId);
                    const color = getCollectionColor(item ? item.collection : '');
                    showPopup(feature, color, item);
                }
            });

            // Setup global cursor hover handler
            map.on('mousemove', (e) => {
                let layersToQuery = Array.from(activeSources)
                    .map(id => `${id}-layer`)
                    .filter(layerId => map.getLayer(layerId));
                
                if (isMegurinRealtimeActive && map.getLayer('megurin-realtime-bus-layer')) {
                    layersToQuery.push('megurin-realtime-bus-layer');
                }
                
                if (layersToQuery.length === 0) {
                    map.getCanvas().style.cursor = '';
                    return;
                }
                const features = map.queryRenderedFeatures(e.point, {
                    layers: layersToQuery
                });
                map.getCanvas().style.cursor = features.length ? 'pointer' : '';
            });
        }

        // Show a beautifully styled custom MapLibre GL popup
        function showPopup(feature, color, item) {
            const props = feature.properties;
            const geom = feature.geometry;
            const name = props['名称'] || props['施設名'] || props['文化財名称'] || '名称不明';
            const address = props['所在地_連結表記'] || props['住所'] || props['所在地'] || '';
            const coord = geom.coordinates;

            // Generate customized properties table
            let tableRowsHtml = '';
            
            // Filter keys to exclude system/unnecessary ones
            const excludedKeys = ['全国地方公共団体コード', '﻿全国地方公共団体コード', 'ID', '緯度', '経度', '名称', '名称_カナ', '所在地_連結表記', '所在地_都道府県', '所在地_市区町村', '所在地_町字', '所在地_番地以下', '住所', '施設名', '文化財名称', '文化財の種別_大区分_名称', '文化財の種別_中区分_名称', '詳細情報_名称'];
            
            for (const [key, value] of Object.entries(props)) {
                // Strip BOM if present
                const cleanKey = key.replace(/^\ufeff/, '');
                if (excludedKeys.includes(cleanKey) || !value) continue;

                let displayVal = value;
                if (cleanKey.toLowerCase().includes('url') || value.toString().startsWith('http')) {
                    displayVal = `<a href="${value}" target="_blank" rel="noopener noreferrer">リンクを開く <i data-lucide="external-link" style="display:inline-block; vertical-align:middle;" width="11" height="11"></i></a>`;
                } else if (cleanKey.includes('電話番号') && value) {
                    displayVal = `<a href="tel:${value}">${value}</a>`;
                } else if (cleanKey.includes('メールアドレス') && value) {
                    displayVal = `<a href="mailto:${value}">${value}</a>`;
                }

                tableRowsHtml += `
                    <div class="popup-row">
                        <div class="popup-label">${cleanKey}</div>
                        <div class="popup-val">${displayVal}</div>
                    </div>
                `;
            }

            const popupContent = `
                <div class="popup-header">
                    <div class="popup-title">${name}</div>
                    <span class="popup-collection-badge" style="background-color: ${color};">
                        ${item ? item.title : '施設データ'}
                    </span>
                </div>
                <div class="popup-body">
                    ${address ? `
                    <div class="popup-row">
                        <div class="popup-label">所在地</div>
                        <div class="popup-val">${address}</div>
                    </div>` : ''}
                    ${tableRowsHtml}
                </div>
                <div class="popup-actions">
                    <button class="btn btn-accent" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' ' + address)}', '_blank')">
                        <i data-lucide="navigation" width="12" height="12"></i> ルート案内
                    </button>
                </div>
            `;

            new maplibregl.Popup({ closeOnClick: true, offset: 10 })
                .setLngLat(coord)
                .setHTML(popupContent)
                .addTo(map);

            // Re-create lucide icons for elements created inside popup
            setTimeout(() => lucide.createIcons(), 50);
        }

        // Fetch Catalog metadata and build layer listing
        async function fetchCatalogAndLoad() {
            await checkStacApi();

            if (isApiOnline) {
                try {
                    // Fetch Collections dynamically
                    const colsResponse = await fetch(`${STAC_API_URL}/collections`);
                    const colsData = await colsResponse.json();
                    allCollections = colsData.collections.map(col => {
                        // Enforce colors and icons for collections
                        return {
                            ...col,
                            color: getCollectionColor(col.id),
                            icon: getCollectionIcon(col.id)
                        };
                    });

                    // Fetch Items inside each collection
                    allItems = [];
                    for (const col of allCollections) {
                        try {
                            const itemsResponse = await fetch(`${STAC_API_URL}/collections/${col.id}/items?limit=100`);
                            const itemsData = await itemsResponse.json();
                            if (itemsData && itemsData.features) {
                                itemsData.features.forEach(feat => {
                                    allItems.push({
                                        id: feat.id,
                                        collection: col.id,
                                        title: feat.properties.title || feat.properties.description || feat.id,
                                        description: feat.properties.description || '',
                                        geojson: resolveGeoJsonUrl(feat.assets.geojson.href),
                                        bbox: feat.bbox
                                    });
                                });
                            }
                        } catch(err) {
                            console.error(`Error loading items for collection ${col.id}`, err);
                        }
                    }
                    console.log('Dynamic API Mode: Loaded collections and items successfully.', { allCollections, allItems });
                } catch(e) {
                    console.error('Error fetching STAC API data, utilizing local static fallback.', e);
                    loadStaticFallback();
                }
            } else {
                loadStaticFallback();
            }

            renderLayers();
        }

        // Load static fallbacks in case API is down
        function loadStaticFallback() {
            allCollections = FALLBACK_COLLECTIONS;
            allItems = FALLBACK_ITEMS;
            console.log('Static Fallback Mode: Loaded collections and items successfully.', { allCollections, allItems });
        }

        // Render Sidebar Collection groups & layers list
        function renderLayers() {
            const container = document.getElementById('collections-container');
            container.innerHTML = '';

            allCollections.forEach(col => {
                const groupItems = allItems.filter(i => i.collection === col.id);
                if (groupItems.length === 0) return; // Hide empty collections

                const groupDiv = document.createElement('div');
                groupDiv.className = `collection-group` + (col.id === 'kodomo-kyoiku' || col.id === 'sports' ? ' expanded' : '');
                groupDiv.id = `col-group-${col.id}`;

                let datasetRowsHtml = '';
                groupItems.forEach(item => {
                    const isActive = activeSources.has(item.id);
                    datasetRowsHtml += `
                        <div class="dataset-item" id="dataset-${item.id}">
                            <div class="custom-checkbox ${isActive ? 'checked' : ''}" style="border-color: ${col.color}; background-color: ${isActive ? col.color : 'transparent'}" onclick="toggleDataset('${item.id}', '${item.geojson}', '${col.color}')">
                                <input type="checkbox" ${isActive ? 'checked' : ''}>
                            </div>
                            <div class="dataset-info" onclick="toggleDataset('${item.id}', '${item.geojson}', '${col.color}')">
                                <div class="dataset-title-row">

        // Toggle dataset layer active/inactive state on Map
        async function toggleDataset(id, geojsonPath, color, autoZoom = true) {
            // Find item metadata
            const item = allItems.find(i => i.id === id);
            if (!item) return;

            const checkboxDiv = document.querySelector(`#dataset-${id} .custom-checkbox`);
            
            if (activeSources.has(id)) {
                // Remove layer
                activeSources.delete(id);
                if (map.getLayer(`${id}-layer`)) {
                    map.removeLayer(`${id}-layer`);
                }
                if (map.getSource(id)) {
                    map.removeSource(id);
                }
                if (checkboxDiv) {
                    checkboxDiv.classList.remove('checked');
                    checkboxDiv.style.backgroundColor = 'transparent';
                }
            } else {
                // Add layer
                activeSources.add(id);
                if (checkboxDiv) {
                    checkboxDiv.classList.add('checked');
                    checkboxDiv.style.backgroundColor = color;
                }

                try {
                    if (isApiOnline) {
                        // Ensure vector tile source is added
                        if (!map.getSource('taito-mvt-source')) {
                            const tileUrl = STAC_API_URL.replace('/stac', '') + '/tiles/{z}/{x}/{y}';
                            map.addSource('taito-mvt-source', {
                                type: 'vector',
                                tiles: [tileUrl],
                                minzoom: 0,
                                maxzoom: 18
                            });
                        }

                        if (!map.getLayer(`${id}-layer`)) {
                            map.addLayer({
                                id: `${id}-layer`,
                                type: 'circle',
                                source: 'taito-mvt-source',
                                'source-layer': 'geojsonLayer',
                                filter: ['==', ['get', 'dataset_id'], id],
                                paint: {
                                    'circle-radius': [
                                        'interpolate',
                                        ['linear'],
                                        ['zoom'],
                                        10, 4,
                                        14, 7,
                                        18, 12
                                    ],
                                    'circle-color': color,
                                    'circle-stroke-width': 1.8,
                                    'circle-stroke-color': '#ffffff',
                                    'circle-opacity': 0.85
                                }
                            });
                        }
                    } else {
                        // Fetch GeoJSON data (with caching) only for offline fallback
                        let geojsonData;
                        if (loadedGeoJsonData[id]) {
                            geojsonData = loadedGeoJsonData[id];
                        } else {
                            const response = await fetch(geojsonPath);
                            geojsonData = await response.json();
                            loadedGeoJsonData[id] = geojsonData;
                        }

                        // Ensure map loaded source
                        if (!map.getSource(id)) {
                            map.addSource(id, {
                                type: 'geojson',
                                data: geojsonData
                            });
                        }

                        if (!map.getLayer(`${id}-layer`)) {
                            map.addLayer({
                                id: `${id}-layer`,
                                type: 'circle',
                                source: id,
                                paint: {
                                    'circle-radius': [
                                        'interpolate',
                                        ['linear'],
                                        ['zoom'],
                                        10, 4,
                                        14, 7,
                                        18, 12
                                    ],
                                    'circle-color': color,
                                    'circle-stroke-width': 1.8,
                                    'circle-stroke-color': '#ffffff',
                                    'circle-opacity': 0.85
                                }
                            });
                        }
                    }

                    if (autoZoom) {
                        // Automatically fly and adjust bounds to loaded dataset!
                        zoomToDataset(id);
                    }

                } catch(e) {
                    console.error(`Failed to load layer for ${id}:`, e);
                    activeSources.delete(id);
                    if (checkboxDiv) {
                        checkboxDiv.classList.remove('checked');
                        checkboxDiv.style.backgroundColor = 'transparent';
                    }
                    alert(`レイヤーの読み込みに失敗しました。`);
                }
            }
        }

        // Zoom map viewport to enclose the bbox of selected dataset
        function zoomToDataset(id) {
            const item = allItems.find(i => i.id === id);
            if (isApiOnline && item && item.bbox && item.bbox.length === 4) {
                map.fitBounds(item.bbox, {
                    padding: 60,
                    duration: 1500,
                    maxZoom: 16
                });
                return;
            }

            const data = loadedGeoJsonData[id];
            if (!data || !data.features || data.features.length === 0) return;

            // Calculate precise bounds
            let minLon = 180, minLat = 90, maxLon = -180, maxLat = -90;
            let count = 0;

            data.features.forEach(feat => {
                if (feat.geometry && feat.geometry.coordinates) {
                    const [lon, lat] = feat.geometry.coordinates;
                    if (lon < minLon) minLon = lon;
                    if (lat < minLat) minLat = lat;
                    if (lon > maxLon) maxLon = lon;
                    if (lat > maxLat) maxLat = lat;
                    count++;
                }
            });

            if (count > 0) {
                map.fitBounds([minLon, minLat, maxLon, maxLat], {
                    padding: 60,
                    duration: 1500,
                    maxZoom: 16
                });
            }
        }

        // Megurin Simulator Controllers & Map Rendering Logic
        function initMegurinRealtimeUI() {
            const toggle = document.getElementById('megurin-realtime-toggle');
            const trigger = document.getElementById('megurin-realtime-trigger');
            const switchDiv = document.getElementById('megurin-toggle-switch');
            const controls = document.getElementById('megurin-simulator-controls');
            
            const btnRealtime = document.getElementById('sim-mode-realtime');
            const btnCustom = document.getElementById('sim-mode-custom');
            const sliderContainer = document.getElementById('sim-slider-container');
            const slider = document.getElementById('sim-time-slider');
            const display = document.getElementById('sim-time-display');

            // Toggle trigger
            const handleToggle = () => {
                isMegurinRealtimeActive = !isMegurinRealtimeActive;
                toggle.checked = isMegurinRealtimeActive;
                switchDiv.classList.toggle('checked', isMegurinRealtimeActive);
                
                if (isMegurinRealtimeActive) {
                    switchDiv.style.backgroundColor = '#818cf8';
                    controls.style.maxHeight = '200px';
                    controls.style.borderTopWidth = '1px';
                    controls.style.borderTopStyle = 'solid';
                    toggleMegurinRealtime(true);
                } else {
                    switchDiv.style.backgroundColor = 'transparent';
                    controls.style.maxHeight = '0';
                    controls.style.borderTopWidth = '0';
                    toggleMegurinRealtime(false);
                }
            };

            trigger.onclick = handleToggle;
            switchDiv.onclick = handleToggle;

            // Mode selector buttons
            btnRealtime.onclick = () => {
                megurinSimMode = 'realtime';
                btnRealtime.classList.add('btn-accent');
                btnCustom.classList.remove('btn-accent');
                sliderContainer.style.display = 'none';
                updateMegurinPositions();
            };

            btnCustom.onclick = () => {
                megurinSimMode = 'custom';
                btnCustom.classList.add('btn-accent');
                btnRealtime.classList.remove('btn-accent');
                sliderContainer.style.display = 'flex';
                
                // Initialize slider with current real time if close to running hours, or default 12:00
                const now = new Date();
                const currentSecs = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                if (currentSecs >= 21600 && currentSecs <= 75600) {
                    megurinSimSeconds = currentSecs;
                } else {
                    megurinSimSeconds = 43200; // 12:00 PM
                }
                slider.value = megurinSimSeconds;
                updateSliderDisplay();
                updateMegurinPositions();
            };

            // Slider change
            slider.oninput = () => {
                megurinSimSeconds = parseInt(slider.value);
                updateSliderDisplay();
                updateMegurinPositions();
            };

            function updateSliderDisplay() {
                const h = Math.floor(megurinSimSeconds / 3600);
                const m = Math.floor((megurinSimSeconds % 3600) / 60);
                const s = megurinSimSeconds % 60;
                display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
        }

        function getSimulationSeconds() {
            if (megurinSimMode === 'realtime') {
                const now = new Date();
                return now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            } else {
                return megurinSimSeconds;
            }
        }

        async function toggleMegurinRealtime(active) {
            const dot = document.getElementById('realtime-status-dot');
            const text = document.getElementById('realtime-status-text');
            const busCountBadge = document.getElementById('sim-bus-count');

            if (active) {
                dot.className = 'status-dot active';
                text.innerText = '配信中';
                
                // Zoom map to Taito-ku region
                map.flyTo({
                    center: [139.7850, 35.7180],
                    zoom: 14.2,
                    pitch: 30,
                    duration: 1500
                });

                // Register SDF image for square bus markers if not exists
                if (!map.getImage('megurin-square-sdf')) {
                    const size = 32;
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    
                    const radius = 6;
                    const pad = 4; // Margin for Halo outline padding
                    
                    ctx.beginPath();
                    ctx.moveTo(pad + radius, pad);
                    ctx.lineTo(size - pad - radius, pad);
                    ctx.quadraticCurveTo(size - pad, pad, size - pad, pad + radius);
                    ctx.lineTo(size - pad, size - pad - radius);
                    ctx.quadraticCurveTo(size - pad, size - pad, size - pad - radius, size - pad);
                    ctx.lineTo(pad + radius, size - pad);
                    ctx.quadraticCurveTo(pad, size - pad, pad, size - pad - radius);
                    ctx.lineTo(pad, pad + radius);
                    ctx.quadraticCurveTo(pad, pad, pad + radius, pad);
                    ctx.closePath();
                    
                    ctx.fillStyle = '#000000'; // SDF requires opaque pixels to define geometry
                    ctx.fill();
                    
                    const imgData = ctx.getImageData(0, 0, size, size);
                    map.addImage('megurin-square-sdf', imgData, { sdf: true });
                }

                // Register real-time source and layers
                const serverBase = STAC_API_URL.replace('/stac', '');
                
                if (!map.getSource('megurin-realtime-source')) {
                    map.addSource('megurin-realtime-source', {
                        type: 'geojson',
                        data: { type: 'FeatureCollection', features: [] }
                    });
                }

                // Symbol layer (SQUARE with SDF) for buses
                if (!map.getLayer('megurin-realtime-bus-layer')) {
                    map.addLayer({
                        id: 'megurin-realtime-bus-layer',
                        type: 'symbol',
                        source: 'megurin-realtime-source',
                        layout: {
                            'icon-image': 'megurin-square-sdf',
                            'icon-size': [
                                'interpolate',
                                ['linear'],
                                ['zoom'],
                                10, 0.4,
                                14, 0.7,
                                18, 1.0
                            ],
                            'icon-allow-overlap': true,
                            'icon-ignore-placement': true
                        },
                        paint: {
                            'icon-color': ['coalesce', ['get', 'route_color'], '#4f46e5'],
                            'icon-halo-color': '#ffffff',
                            'icon-halo-width': 2.5
                        }
                    });
                }

                // Label layer for routes
                if (!map.getLayer('megurin-realtime-label-layer')) {
                    map.addLayer({
                        id: 'megurin-realtime-label-layer',
                        type: 'symbol',
                        source: 'megurin-realtime-source',
                        layout: {
                            'text-field': ['get', 'route_name'],
                            'text-size': 11,
                            'text-offset': [0, 1.6],
                            'text-anchor': 'top',
                            'text-allow-overlap': true,
                            'text-ignore-placement': true
                        },
                        paint: {
                            'text-color': '#ffffff',
                            'text-halo-color': 'rgba(8, 12, 20, 0.9)',
                            'text-halo-width': 2.0
                        }
                    });
                }

                // Polling loop
                megurinRealtimeTimer = setInterval(() => {
                    if (megurinSimMode === 'custom') {
                        // Increment simulation seconds slightly (e.g., +3 seconds per ticks to make it animated)
                        megurinSimSeconds += 3;
                        if (megurinSimSeconds > 75600) megurinSimSeconds = 21600; // loop back to 6:00 AM
                        const slider = document.getElementById('sim-time-slider');
                        if (slider) {
                            slider.value = megurinSimSeconds;
                            const h = Math.floor(megurinSimSeconds / 3600);
                            const m = Math.floor((megurinSimSeconds % 3600) / 60);
                            const s = megurinSimSeconds % 60;
                            document.getElementById('sim-time-display').innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                        }
                    }
                    updateMegurinPositions();
                }, 1500);

                // Trigger first update
                updateMegurinPositions();

            } else {
                dot.className = 'status-dot';
                text.innerText = '停止中';
                busCountBadge.innerText = '0 台';

                if (megurinRealtimeTimer) {
                    clearInterval(megurinRealtimeTimer);
                    megurinRealtimeTimer = null;
                }

                // Cleanup map layers
                if (map.getLayer('megurin-realtime-label-layer')) map.removeLayer('megurin-realtime-label-layer');
                if (map.getLayer('megurin-realtime-bus-layer')) map.removeLayer('megurin-realtime-bus-layer');
                if (map.getSource('megurin-realtime-source')) map.removeSource('megurin-realtime-source');
            }
        }

        async function updateMegurinPositions() {
            if (!isMegurinRealtimeActive || !map) return;

            const secs = getSimulationSeconds();
            const serverBase = STAC_API_URL.replace('/stac', '');
            
            // Fetch GeoJSON positions dynamically for both UI counting and smooth map rendering
            try {
                const busCountBadge = document.getElementById('sim-bus-count');
                fetch(`${serverBase}/state/buses?seconds=${secs}`)
                    .then(res => res.json())
                    .then(data => {
                        // 1. Update active buses count on UI
                        const count = (data && data.features) ? data.features.length : 0;
                        busCountBadge.innerText = `${count} 台`;
                        if (count > 0) {
                            busCountBadge.style.color = '#10b981';
                        } else {
                            busCountBadge.style.color = 'var(--text-secondary)';
                            if (megurinSimMode === 'realtime') {
                                busCountBadge.innerText = `0 台 (運行時間外)`;
                            }
                        }

                        // 2. Smoothly update GeoJSON source on map without any flickering
                        const source = map.getSource('megurin-realtime-source');
                        if (source && data) {
                            source.setData(data);
                        }
                    })
                    .catch(err => {
                        console.error("Failed to fetch active bus coordinates:", err);
                    });
            } catch (err) {
                console.error("Error updating bus coordinates & count details", err);
            }
        }
